name: Publish to WinGet

permissions:
  contents: read

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag (e.g. v0.4.6)'
        required: true

env:
  PACKAGE_IDENTIFIER: fjrevoredo.MiniDiarium
  WINGETCREATE_VERSION: 1.12.8.0

jobs:
  publish-winget:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 20

      - name: Verify WINGET_TOKEN secret is set
        shell: pwsh
        run: |
          if (-not "${{ secrets.WINGET_TOKEN }}") {
            Write-Error "WINGET_TOKEN secret is not set. Add it at Settings → Secrets and variables → Actions."
            exit 1
          }
          Write-Host "WINGET_TOKEN is configured."

      - name: Determine version and asset
        id: prep
        shell: pwsh
        run: |
          $tag = if ("${{ inputs.tag }}") { "${{ inputs.tag }}" } else { "${{ github.event.release.tag_name || github.ref_name }}" }
          $version = $tag -replace '^v', ''
          $assetName = "Mini-Diarium-$version-windows.exe"
          $url = "https://github.com/fjrevoredo/mini-diarium/releases/download/$tag/$assetName"

          "tag=$tag" >> $env:GITHUB_OUTPUT
          "version=$version" >> $env:GITHUB_OUTPUT
          "asset_name=$assetName" >> $env:GITHUB_OUTPUT
          "url=$url" >> $env:GITHUB_OUTPUT

      - name: Read published release metadata
        id: release
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $tag = "${{ steps.prep.outputs.tag }}"
          $releaseJson = gh api "/repos/fjrevoredo/mini-diarium/releases/tags/$tag"
          $release = $releaseJson | ConvertFrom-Json

          if (-not $release.html_url) {
            Write-Error "Release URL not found for $tag"
            exit 1
          }

          if (-not $release.body -or [string]::IsNullOrWhiteSpace($release.body)) {
            Write-Error "Published release body is empty for $tag"
            exit 1
          }

          $assetFound = $release.assets.name -contains "${{ steps.prep.outputs.asset_name }}"
          if (-not $assetFound) {
            Write-Error "Asset ${{ steps.prep.outputs.asset_name }} not found in release $tag"
            exit 1
          }

          Set-Content -Path release-body.md -Value $release.body -NoNewline
          "release_url=$($release.html_url)" >> $env:GITHUB_OUTPUT
          "release_date=$($release.published_at.Substring(0, 10))" >> $env:GITHUB_OUTPUT

      - name: Download pinned wingetcreate
        shell: pwsh
        run: |
          $version = "${{ env.WINGETCREATE_VERSION }}"
          $downloadUrl = "https://github.com/microsoft/winget-create/releases/download/v$version/wingetcreate.exe"
          Invoke-WebRequest $downloadUrl -OutFile wingetcreate.exe
          if (-not (Test-Path wingetcreate.exe)) {
            Write-Error "Failed to download wingetcreate.exe from $downloadUrl"
            exit 1
          }

      - name: Generate WinGet manifests
        shell: pwsh
        run: |
          $version = "${{ steps.prep.outputs.version }}"
          $url = "${{ steps.prep.outputs.url }}"
          $releaseDate = "${{ steps.release.outputs.release_date }}"
          $releaseUrl = "${{ steps.release.outputs.release_url }}"

          New-Item -ItemType Directory -Path winget-manifests -Force | Out-Null

          .\wingetcreate.exe update ${{ env.PACKAGE_IDENTIFIER }} `
            --version $version `
            --urls "$url|x64" `
            --release-date $releaseDate `
            --release-notes-url $releaseUrl `
            --out winget-manifests

          if ($LASTEXITCODE -ne 0) {
            Write-Error "wingetcreate failed with exit code $LASTEXITCODE"
            exit 1
          }

      - name: Enrich locale manifest with release notes
        shell: pwsh
        run: |
          node scripts/enrich-winget-manifest.mjs `
            --manifest-dir winget-manifests `
            --release-notes-file release-body.md `
            --release-notes-url "${{ steps.release.outputs.release_url }}"

      - name: Verify enriched manifest
        id: verify_manifest
        shell: pwsh
        run: |
          $localeManifest = Get-ChildItem -Path winget-manifests -Recurse -Filter "*.yaml" |
            Where-Object { Select-String -Path $_.FullName -Pattern '^ManifestType:\s*defaultLocale$' -Quiet } |
            Select-Object -First 1

          if (-not $localeManifest) {
            Write-Error "Could not find the enriched defaultLocale manifest"
            exit 1
          }

          $content = Get-Content $localeManifest.FullName -Raw
          if ($content -notmatch '(?m)^ManifestVersion:\s*1\.12\.0$') {
            Write-Error "ManifestVersion 1.12.0 not found in $($localeManifest.FullName)"
            exit 1
          }
          if ($content -notmatch "(?m)^ReleaseDate:\s+${{ steps.release.outputs.release_date }}$") {
            Write-Error "ReleaseDate was not updated in $($localeManifest.FullName)"
            exit 1
          }
          if ($content -notmatch '(?m)^ReleaseNotes:\s+\|-$') {
            Write-Error "ReleaseNotes block was not added to $($localeManifest.FullName)"
            exit 1
          }
          if ($content -notmatch '(?m)^ReleaseNotesUrl:\s+https://github\.com/fjrevoredo/mini-diarium/releases/tag/v') {
            Write-Error "ReleaseNotesUrl was not updated in $($localeManifest.FullName)"
            exit 1
          }
          "manifest_path=$($localeManifest.FullName)" >> $env:GITHUB_OUTPUT

      - name: Submit WinGet PR
        shell: pwsh
        env:
          WINGET_CREATE_GITHUB_TOKEN: ${{ secrets.WINGET_TOKEN }}
        run: |
          $version = "${{ steps.prep.outputs.version }}"
          $manifestPath = "${{ steps.verify_manifest.outputs.manifest_path }}"

          .\wingetcreate.exe submit `
            --prtitle "Add ${{ env.PACKAGE_IDENTIFIER }} version $version" `
            --token $env:WINGET_CREATE_GITHUB_TOKEN `
            --no-open `
            $manifestPath

          if ($LASTEXITCODE -ne 0) {
            Write-Error "wingetcreate submit failed with exit code $LASTEXITCODE"
            exit 1
          }
