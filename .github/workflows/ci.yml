name: CI

permissions:
  contents: read

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.2

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Cache bun dependencies
        uses: actions/cache@v5
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('bun.lock') }}
          restore-keys: ${{ runner.os }}-bun-

      - name: Cache Rust artifacts
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target
          cache-on-failure: true

      - name: Install Linux system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Install frontend dependencies
        run: bun install --frozen-lockfile

      - name: ESLint
        run: bun run lint

      - name: Prettier
        run: bun run format:check

      - name: TypeScript
        run: bun run type-check

      - name: Clippy
        working-directory: src-tauri
        run: cargo clippy --all-targets -- -D warnings

      - name: Rustfmt
        working-directory: src-tauri
        run: cargo fmt --check

      - name: Cache D2 binary
        id: cache-d2
        uses: actions/cache@v5
        with:
          path: ~/.local/bin/d2
          key: d2-v0.7.1-linux  # bump this key when upgrading D2

      - name: Install D2
        if: steps.cache-d2.outputs.cache-hit != 'true'
        run: |
          set -euo pipefail
          curl -fsSL https://d2lang.com/install.sh | sh -s -- --version v0.7.1 || D2_VERSION=v0.7.1 curl -fsSL https://d2lang.com/install.sh | sh -s --
          ~/.local/bin/d2 --version | grep -Eq '0\.7\.1'

      - name: Add D2 to PATH
        run: echo "$HOME/.local/bin" >> $GITHUB_PATH

      - name: Verify diagrams are up-to-date
        run: bun run diagrams:check

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.2

      - uses: dtolnay/rust-toolchain@stable

      - name: Cache bun dependencies
        uses: actions/cache@v5
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('bun.lock') }}
          restore-keys: ${{ runner.os }}-bun-

      - name: Cache Rust artifacts
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target
          cache-on-failure: true

      - name: Install Linux system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Install frontend dependencies
        run: bun install --frozen-lockfile

      - name: Cache nextest binary
        id: cache-nextest
        uses: actions/cache@v5
        with:
          path: ~/.cargo/bin/cargo-nextest
          key: nextest-Linux-v0.9  # bump this key when upgrading nextest

      - name: Install cargo-nextest
        if: steps.cache-nextest.outputs.cache-hit != 'true'
        run: cargo install cargo-nextest --locked

      - name: Frontend tests
        run: bun run test:run

      - name: Backend tests
        working-directory: src-tauri
        run: cargo nextest run

  build-linux:
    name: Build (Linux)
    needs: [lint, test]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.2

      - uses: actions/setup-node@v6
        with:
          node-version: 20

      - uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust artifacts
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target
          cache-targets: false   # release+LTO artifacts too large; not incrementally reusable
          cache-on-failure: false

      - name: Install Linux system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Install frontend dependencies
        run: bun install --frozen-lockfile

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CARGO_PROFILE_RELEASE_LTO: thin         # thin LTO for CI speed; release.yml uses full LTO
          CARGO_PROFILE_RELEASE_OPT_LEVEL: "2"    # opt-level 2 sufficient for CI validation

      - name: Upload artifacts
        uses: actions/upload-artifact@v7
        with:
          name: mini-diarium-ubuntu-latest
          path: |
            src-tauri/target/release/bundle/**/*.AppImage
            src-tauri/target/release/bundle/**/*.deb
          if-no-files-found: ignore

      - name: Upload Linux binary for E2E tests
        uses: actions/upload-artifact@v7
        with:
          name: mini-diarium-linux-binary
          path: src-tauri/target/release/mini-diarium

  build-other:
    name: Build (${{ matrix.os }})
    needs: [lint, test]
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v6

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.2

      - uses: actions/setup-node@v6
        with:
          node-version: 20

      - uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust artifacts
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target
          cache-targets: false   # release+LTO artifacts too large; not incrementally reusable
          cache-on-failure: false

      - name: Install frontend dependencies
        run: bun install --frozen-lockfile

      - name: Configure macOS DMG bundling for headless CI
        if: runner.os == 'macOS'
        run: echo "JENKINS_URL=${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}" >> "$GITHUB_ENV"

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CARGO_PROFILE_RELEASE_LTO: thin         # thin LTO for CI speed; release.yml uses full LTO
          CARGO_PROFILE_RELEASE_OPT_LEVEL: "2"    # opt-level 2 sufficient for CI validation

      - name: Debug macOS DMG bundling failure
        if: failure() && runner.os == 'macOS'
        run: |
          echo "Dumping generated bundle_dmg.sh scripts (if any):"
          find src-tauri/target -name "bundle_dmg.sh" -print -exec sed -n '1,260p' {} \;

      - name: Upload artifacts
        uses: actions/upload-artifact@v7
        with:
          name: mini-diarium-${{ matrix.os }}
          path: |
            src-tauri/target/release/bundle/**/*.dmg
            src-tauri/target/release/bundle/**/*.app
            src-tauri/target/release/bundle/**/*.msi
            src-tauri/target/release/bundle/**/*.exe
          if-no-files-found: ignore

  e2e:
    name: E2E Tests
    runs-on: ubuntu-latest
    needs: build-linux   # only needs Linux binary; decoupled from slow macOS/Windows builds
    steps:
      - uses: actions/checkout@v6

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.2

      - name: Cache tauri-driver binary
        id: cache-tauri-driver
        uses: actions/cache@v5
        with:
          path: ~/.cargo/bin/tauri-driver
          key: tauri-driver-Linux-v0.1   # bump this key when upgrading tauri-driver
          restore-keys: tauri-driver-Linux-

      - name: Install Rust toolchain (for tauri-driver install only)
        if: steps.cache-tauri-driver.outputs.cache-hit != 'true'
        uses: dtolnay/rust-toolchain@stable

      - name: Install tauri-driver
        if: steps.cache-tauri-driver.outputs.cache-hit != 'true'
        run: cargo install tauri-driver

      - name: Install Linux system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            webkit2gtk-driver \
            xvfb \
            libappindicator3-dev \
            librsvg2-dev

      - name: Download Linux binary
        uses: actions/download-artifact@v8
        with:
          name: mini-diarium-linux-binary
          path: src-tauri/target/release/

      - name: Mark binary executable
        run: chmod +x src-tauri/target/release/mini-diarium

      - name: Install JS dependencies
        run: bun install --frozen-lockfile

      - name: Run E2E tests (clean mode)
        run: xvfb-run --auto-servernum bun run test:e2e

      - name: Run E2E tests (stateful mode)
        env:
          E2E_STATEFUL_ROOT: ${{ github.workspace }}/.e2e-stateful-ci
        run: xvfb-run --auto-servernum bun run test:e2e:stateful
