name: Release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

env:
  LATEST_CHANGELOG_FILE: latest-changelog.md
  LATEST_CHANGELOG_TEMPLATE: latest-changelog.example.md

jobs:
  create-release:
    name: Create Release Draft
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.get_version.outputs.version }}
    steps:
      - uses: actions/checkout@v6

      - name: Get version from tag
        id: get_version
        run: echo "version=${GITHUB_REF#refs/tags/v}" >> "$GITHUB_OUTPUT"

      - name: Validate latest changelog file
        shell: bash
        run: |
          if [ ! -f "$LATEST_CHANGELOG_FILE" ]; then
            echo "Missing $LATEST_CHANGELOG_FILE in the tagged commit."
            echo "Create it from $LATEST_CHANGELOG_TEMPLATE before tagging the release."
            exit 1
          fi

          if [ ! -s "$LATEST_CHANGELOG_FILE" ]; then
            echo "$LATEST_CHANGELOG_FILE is empty."
            exit 1
          fi

          if ! grep -q '[^[:space:]]' "$LATEST_CHANGELOG_FILE"; then
            echo "$LATEST_CHANGELOG_FILE only contains whitespace."
            exit 1
          fi

          if [ -f "$LATEST_CHANGELOG_TEMPLATE" ] && cmp -s "$LATEST_CHANGELOG_FILE" "$LATEST_CHANGELOG_TEMPLATE"; then
            echo "$LATEST_CHANGELOG_FILE still matches the untouched template."
            exit 1
          fi

          if grep -q 'REPLACE BEFORE TAGGING' "$LATEST_CHANGELOG_FILE"; then
            echo "$LATEST_CHANGELOG_FILE still contains placeholder text."
            exit 1
          fi

      - name: Create draft release from latest changelog
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: Mini Diarium v${{ steps.get_version.outputs.version }}
          draft: true
          prerelease: false
          body_path: ${{ env.LATEST_CHANGELOG_FILE }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-release:
    name: Build Release (${{ matrix.platform }})
    needs: create-release
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            platform: linux
            arch: x86_64
          - os: macos-latest
            platform: macos
            arch: universal
          - os: windows-latest
            platform: windows
            arch: x86_64

    steps:
      - uses: actions/checkout@v6

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.2

      - uses: actions/setup-node@v6
        with:
          node-version: 20

      - uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo dependencies
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            src-tauri/target/
          key: ${{ runner.os }}-cargo-release-${{ hashFiles('src-tauri/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-release-
            ${{ runner.os }}-cargo-

      - name: Install Linux system dependencies
        if: matrix.platform == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Install macOS Rust targets (universal binary)
        if: matrix.platform == 'macos'
        run: rustup target add aarch64-apple-darwin x86_64-apple-darwin

      - name: Install frontend dependencies
        run: bun install --frozen-lockfile

      - name: Configure macOS DMG bundling for headless CI
        if: matrix.platform == 'macos'
        run: |
          echo "JENKINS_URL=${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}" >> "$GITHUB_ENV"

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          args: ${{ matrix.platform == 'macos' && '--target universal-apple-darwin' || '' }}

      - name: Debug macOS DMG bundling failure
        if: failure() && matrix.platform == 'macos'
        run: |
          echo "Dumping generated bundle_dmg.sh scripts (if any):"
          find src-tauri/target -name "bundle_dmg.sh" -print -exec sed -n '1,260p' {} \;

      - name: Prepare release artifacts (Linux)
        if: matrix.platform == 'linux'
        run: |
          mkdir -p release-artifacts
          VERSION="${{ needs.create-release.outputs.version }}"

          find src-tauri/target/release/bundle -name "*.AppImage" -exec cp {} release-artifacts/Mini-Diarium-${VERSION}-linux.AppImage \;
          find src-tauri/target/release/bundle -name "*.deb" -exec cp {} release-artifacts/Mini-Diarium-${VERSION}-linux.deb \;

          cd release-artifacts
          sha256sum * > checksums-linux.txt
          cat checksums-linux.txt

      - name: Prepare release artifacts (macOS)
        if: matrix.platform == 'macos'
        run: |
          mkdir -p release-artifacts
          VERSION="${{ needs.create-release.outputs.version }}"

          find src-tauri/target/universal-apple-darwin/release/bundle -name "*.dmg" -exec cp {} release-artifacts/Mini-Diarium-${VERSION}-macos.dmg \;

          cd release-artifacts
          shasum -a 256 * > checksums-macos.txt
          cat checksums-macos.txt

      - name: Prepare release artifacts (Windows)
        if: matrix.platform == 'windows'
        shell: bash
        run: |
          mkdir -p release-artifacts
          VERSION="${{ needs.create-release.outputs.version }}"

          find src-tauri/target/release/bundle -name "*.msi" -exec cp {} release-artifacts/Mini-Diarium-${VERSION}-windows.msi \;
          find src-tauri/target/release/bundle/nsis -name "*.exe" -exec cp {} release-artifacts/Mini-Diarium-${VERSION}-windows.exe \; || true

          cd release-artifacts
          sha256sum * > checksums-windows.txt
          cat checksums-windows.txt

      - name: Verify release artifacts are present
        shell: bash
        run: |
          if [ ! -d release-artifacts ]; then
            echo "release-artifacts directory is missing"
            exit 1
          fi

          ls -lh release-artifacts

          if [ "$(find release-artifacts -maxdepth 1 -type f | wc -l)" -eq 0 ]; then
            echo "No release artifacts were prepared"
            exit 1
          fi

      - name: Upload release artifacts
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          draft: true
          files: release-artifacts/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  publish-release:
    name: Publish Release
    needs:
      - create-release
      - build-release
    runs-on: ubuntu-latest
    steps:
      - name: Verify expected release assets exist
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          tag="${GITHUB_REF_NAME}"
          version="${{ needs.create-release.outputs.version }}"
          assets="$(gh release view "$tag" --json assets --jq '.assets[].name')"

          printf '%s\n' "$assets"

          for expected in \
            "Mini-Diarium-${version}-windows.exe" \
            "Mini-Diarium-${version}-windows.msi" \
            "Mini-Diarium-${version}-macos.dmg" \
            "Mini-Diarium-${version}-linux.AppImage" \
            "Mini-Diarium-${version}-linux.deb"
          do
            if ! printf '%s\n' "$assets" | grep -Fxq "$expected"; then
              echo "Missing expected release asset: $expected"
              exit 1
            fi
          done

      - name: Publish draft release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release edit "$GITHUB_REF_NAME" --draft=false

      - name: Check out master for changelog cleanup
        uses: actions/checkout@v6
        with:
          ref: master
          fetch-depth: 0

      - name: Create cleanup PR when latest changelog matches the tagged release
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          tag_file="$(mktemp)"
          git show "${GITHUB_REF_NAME}:${LATEST_CHANGELOG_FILE}" > "$tag_file"

          if [ ! -f "$LATEST_CHANGELOG_FILE" ]; then
            echo "$LATEST_CHANGELOG_FILE is already absent on master; skipping cleanup PR."
            exit 0
          fi

          if ! cmp -s "$LATEST_CHANGELOG_FILE" "$tag_file"; then
            echo "$LATEST_CHANGELOG_FILE has changed on master since the tag was created; skipping cleanup PR."
            exit 0
          fi

          cleanup_branch="automation/clear-latest-changelog-${GITHUB_REF_NAME}"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git checkout -B "$cleanup_branch"
          git rm "$LATEST_CHANGELOG_FILE"
          git commit -m "chore(release): clear latest changelog after ${GITHUB_REF_NAME}"
          git push --force-with-lease origin "HEAD:${cleanup_branch}"

          existing_pr="$(gh pr list --head "$cleanup_branch" --base master --state open --json number --jq '.[0].number')"
          if [ -n "$existing_pr" ] && [ "$existing_pr" != "null" ]; then
            echo "Cleanup PR #${existing_pr} already exists."
            exit 0
          fi

          gh pr create \
            --base master \
            --head "$cleanup_branch" \
            --title "chore(release): clear latest changelog after ${GITHUB_REF_NAME}" \
            --body "Automated cleanup PR created after publishing ${GITHUB_REF_NAME}. Removes ${LATEST_CHANGELOG_FILE} so the next release must create a fresh copy from ${LATEST_CHANGELOG_TEMPLATE}."
